spring:
  application:
    name: nexusfin-equity
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:nexusfin_equity}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

server:
  port: ${SERVER_PORT:8080}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      table-underline: true

logging:
  level:
    com.nexusfin.equity: INFO

nexusfin:
  business:
    default-provider-code: ${DEFAULT_BENEFIT_PROVIDER_CODE:QW}
  third-party:
    tech-platform:
      enabled: ${TECH_PLATFORM_API_ENABLED:true}
      mode: ${TECH_PLATFORM_API_MODE:MOCK}
      base-url: ${TECH_PLATFORM_API_BASE_URL:https://tech-platform.local}
      channel-id: ${TECH_PLATFORM_API_CHANNEL_ID:abs-app}
      version: ${TECH_PLATFORM_API_VERSION:1.0.0}
      sign-secret: ${TECH_PLATFORM_API_SIGN_SECRET:tech-platform-secret}
      sign-algorithm: ${TECH_PLATFORM_API_SIGN_ALGORITHM:HMAC_SHA256}
      aes-key-base64: ${TECH_PLATFORM_API_AES_KEY_BASE64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      aes-algorithm: ${TECH_PLATFORM_API_AES_ALGORITHM:AES/ECB/PKCS5Padding}
      gcm-tag-bits: ${TECH_PLATFORM_API_GCM_TAG_BITS:128}
      iv-length-bytes: ${TECH_PLATFORM_API_IV_LENGTH_BYTES:12}
      connect-timeout-ms: ${TECH_PLATFORM_API_CONNECT_TIMEOUT_MS:2000}
      read-timeout-ms: ${TECH_PLATFORM_API_READ_TIMEOUT_MS:3000}
      paths:
        credit-status-notice: ${TECH_PLATFORM_API_CREDIT_STATUS_NOTICE_PATH:/guide/api/creditStatusNotice}
        loan-info-notice: ${TECH_PLATFORM_API_LOAN_INFO_NOTICE_PATH:/guide/api/loanInfoNotice}
        repay-info-notice: ${TECH_PLATFORM_API_REPAY_INFO_NOTICE_PATH:/guide/api/repayInfoNotice}
    qw:
      enabled: ${QW_ENABLED:true}
      mode: ${QW_MODE:MOCK}
      base-url: ${QW_BASE_URL:https://t-api.test.qweimobile.com}
      method-path: ${QW_METHOD_PATH:/api/abs/method}
      partner-no: ${QW_PARTNER_NO:abs-app}
      version: ${QW_VERSION:v1.0}
      sign-key: ${QW_SIGN_KEY:abs-secret-key}
      connect-timeout-ms: ${QW_CONNECT_TIMEOUT_MS:2000}
      read-timeout-ms: ${QW_READ_TIMEOUT_MS:3000}
      aes-key-base64: ${QW_AES_KEY_BASE64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      aes-algorithm: ${QW_AES_ALGORITHM:AES/GCM/NoPadding}
      gcm-tag-bits: ${QW_GCM_TAG_BITS:128}
      iv-length-bytes: ${QW_IV_LENGTH_BYTES:12}
      default-pay-protocol-prefix: ${QW_DEFAULT_PAY_PROTOCOL_PREFIX:proto-}
      mock-exercise-base-url: ${QW_MOCK_EXERCISE_BASE_URL:https://mock-qw.local/exercise}
      direct:
        base-url: ${QW_DIRECT_BASE_URL:https://tlt-test.allinpay.com}
        process-path: ${QW_DIRECT_PROCESS_PATH:/aipg/ProcessServlet}
        merchant-id: ${QW_DIRECT_MERCHANT_ID:}
        user-name: ${QW_DIRECT_USER_NAME:}
        user-password: ${QW_DIRECT_USER_PASSWORD:}
        channel-code: ${QW_DIRECT_CHANNEL_CODE:}
        account-no: ${QW_DIRECT_ACCOUNT_NO:}
        pkcs12-path: ${QW_DIRECT_PKCS12_PATH:}
        pkcs12-password: ${QW_DIRECT_PKCS12_PASSWORD:}
        verify-cert-path: ${QW_DIRECT_VERIFY_CERT_PATH:}
        connect-timeout-ms: ${QW_DIRECT_CONNECT_TIMEOUT_MS:3000}
        read-timeout-ms: ${QW_DIRECT_READ_TIMEOUT_MS:5000}
        member-sync-service-code: ${QW_DIRECT_MEMBER_SYNC_SERVICE_CODE:}
        exercise-url-service-code: ${QW_DIRECT_EXERCISE_URL_SERVICE_CODE:}
        lending-notify-service-code: ${QW_DIRECT_LENDING_NOTIFY_SERVICE_CODE:}
  crypto:
    dek:
      key-id: ${NEXUSFIN_CRYPTO_DEK_KEY_ID:DEK_USER_PROFILE}
      key-version: ${NEXUSFIN_CRYPTO_DEK_KEY_VERSION:1}
      algorithm: AES/GCM/NoPadding
      purpose: encrypt_user_sensitive_fields
      status: ACTIVE
      plaintext-key-base64: ${NEXUSFIN_CRYPTO_DEK_PLAINTEXT_BASE64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
    inbound:
      default-mode: ${NEXUSFIN_CRYPTO_INBOUND_DEFAULT_MODE:PLAIN}
      channel-modes:
        KJ: ${NEXUSFIN_CRYPTO_INBOUND_KJ_MODE:PLAIN}
  signature:
    app-id: ${NEXUSFIN_APP_ID:abs-app}
    secret: ${NEXUSFIN_APP_SECRET:abs-secret-key}
    max-skew-seconds: 300
    protected-path-prefixes:
      - /api/callbacks
  auth:
    tech-platform-base-url: ${TECH_PLATFORM_BASE_URL:http://localhost:18080}
    tech-platform-user-me-path: ${TECH_PLATFORM_USER_ME_PATH:/api/users/me}
    connect-timeout-ms: ${TECH_PLATFORM_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${TECH_PLATFORM_READ_TIMEOUT_MS:3000}
    retry-max-attempts: ${TECH_PLATFORM_RETRY_MAX_ATTEMPTS:2}
    default-channel-code: ${AUTH_DEFAULT_CHANNEL_CODE:KJ}
    default-redirect-url: ${AUTH_DEFAULT_REDIRECT_URL:/equity/index}
    redirect-whitelist:
      - /equity/
      - https://equity.nexusfin.com/
    protected-path-prefixes:
      - /api/equity/products
      - /api/equity/orders
      - /api/equity/exercise-url
      - /api/users/me
    excluded-path-prefixes:
      - /api/equity/health
      - /api/auth/sso-callback
      - /api/callbacks
    jwt:
      issuer: ${AUTH_JWT_ISSUER:nexusfin-equity}
      secret: ${AUTH_JWT_SECRET:equity-jwt-secret-key-equity-jwt-secret}
      ttl-seconds: ${AUTH_JWT_TTL_SECONDS:7200}
      cookie-name: ${AUTH_COOKIE_NAME:NEXUSFIN_AUTH}
      cookie-path: /
      cookie-secure: ${AUTH_COOKIE_SECURE:true}
      cookie-http-only: true
      cookie-same-site: Lax
