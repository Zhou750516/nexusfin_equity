spring:
  datasource:
    url: jdbc:mysql://${MYSQL_IT_HOST:localhost}:${MYSQL_IT_PORT:3306}/${MYSQL_IT_DATABASE:nexusfin_equity}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_IT_USERNAME:root}
    password: ${MYSQL_IT_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never

nexusfin:
  third-party:
    tech-platform:
      enabled: true
      mode: MOCK
      base-url: https://tech-platform.test
      channel-id: abs-test
      version: 1.0.0
      sign-secret: tech-platform-secret
      sign-algorithm: HMAC_SHA256
      aes-key-base64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      aes-algorithm: AES/ECB/PKCS5Padding
      gcm-tag-bits: 128
      iv-length-bytes: 12
      connect-timeout-ms: 2000
      read-timeout-ms: 3000
      paths:
        credit-status-notice: /guide/api/creditStatusNotice
        loan-info-notice: /guide/api/loanInfoNotice
        repay-info-notice: /guide/api/repayInfoNotice
    qw:
      enabled: true
      mode: MOCK
      base-url: https://t-api.test.qweimobile.com
      method-path: /api/abs/method
      partner-no: test-partner
      version: v1.0
      sign-key: test-sign-key
      connect-timeout-ms: 2000
      read-timeout-ms: 3000
      aes-key-base64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      aes-algorithm: AES/GCM/NoPadding
      gcm-tag-bits: 128
      iv-length-bytes: 12
      default-pay-protocol-prefix: proto-
      mock-exercise-base-url: https://mock-qw.test/exercise
      direct:
        base-url: https://tlt-test.allinpay.com
        process-path: /aipg/ProcessServlet
        merchant-id: 200000000007804
        user-name: 20000000000780404
        user-password: 111111
        channel-code: allinpay-1
        account-no: 200000000007804
        pkcs12-path: docs/third-part/齐为/通联测试证书/user-rsa.p12
        pkcs12-password: 111111
        verify-cert-path: docs/third-part/齐为/通联测试证书/public-rsa.cer
        connect-timeout-ms: 3000
        read-timeout-ms: 5000
        member-sync-service-code: SYNC001
        exercise-url-service-code: TOKEN001
        lending-notify-service-code: LEND001
  signature:
    app-id: test-app
    secret: test-secret
    max-skew-seconds: 300
    protected-path-prefixes:
      - /api/callbacks
  auth:
    tech-platform-base-url: http://localhost:18080
    tech-platform-user-me-path: /api/users/me
    connect-timeout-ms: 2000
    read-timeout-ms: 3000
    retry-max-attempts: 2
    default-channel-code: KJ
    default-redirect-url: /equity/index
    redirect-whitelist:
      - /equity/
      - https://equity.nexusfin.com/
    protected-path-prefixes:
      - /api/equity/products
      - /api/equity/orders
      - /api/equity/exercise-url
      - /api/users/me
    excluded-path-prefixes:
      - /api/equity/health
      - /api/auth/sso-callback
      - /api/callbacks
    jwt:
      issuer: nexusfin-equity-test
      secret: test-jwt-secret-key-test-jwt-secret-key
      ttl-seconds: 7200
      cookie-name: NEXUSFIN_AUTH
      cookie-path: /
      cookie-secure: false
      cookie-http-only: true
      cookie-same-site: Lax
