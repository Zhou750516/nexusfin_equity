spring:
  datasource:
    url: jdbc:h2:mem:nexusfin-equity;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql

nexusfin:
  business:
    default-provider-code: QW
  third-party:
    qw:
      enabled: true
      mode: MOCK
      base-url: https://t-api.test.qweimobile.com
      method-path: /api/abs/method
      partner-no: test-partner
      version: v1.0
      sign-key: test-sign-key
      connect-timeout-ms: 2000
      read-timeout-ms: 3000
      aes-key-base64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      aes-algorithm: AES/GCM/NoPadding
      gcm-tag-bits: 128
      iv-length-bytes: 12
      default-pay-protocol-prefix: proto-
      mock-exercise-base-url: https://mock-qw.test/exercise
  crypto:
    dek:
      key-id: DEK_USER_PROFILE
      key-version: 1
      algorithm: AES/GCM/NoPadding
      purpose: encrypt_user_sensitive_fields
      status: ACTIVE
      plaintext-key-base64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    inbound:
      default-mode: PLAIN
      channel-modes:
        KJ: PLAIN
  signature:
    app-id: test-app
    secret: test-secret
    max-skew-seconds: 300
    protected-path-prefixes:
      - /api/callbacks
  auth:
    tech-platform-base-url: http://localhost:18080
    tech-platform-user-me-path: /api/users/me
    connect-timeout-ms: 2000
    read-timeout-ms: 3000
    default-channel-code: KJ
    default-redirect-url: /equity/index
    redirect-whitelist:
      - /equity/
      - https://equity.nexusfin.com/
    protected-path-prefixes:
      - /api/equity/products
      - /api/equity/orders
      - /api/equity/exercise-url
      - /api/users/me
    excluded-path-prefixes:
      - /api/equity/health
      - /api/auth/sso-callback
      - /api/callbacks
    jwt:
      issuer: nexusfin-equity-test
      secret: test-jwt-secret-key-test-jwt-secret-key
      ttl-seconds: 7200
      cookie-name: NEXUSFIN_AUTH
      cookie-path: /
      cookie-secure: false
      cookie-http-only: true
      cookie-same-site: Lax
