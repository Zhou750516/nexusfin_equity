spring:
  datasource:
    url: jdbc:h2:mem:nexusfin-equity;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql

nexusfin:
  async-compensation:
    enabled: false
    worker-enabled: false
    supervisor-enabled: false
    worker-poll-interval-ms: 3000
    supervisor-interval-ms: 15000
    worker-id:
    owned-partitions:
    partition-count: 8
    max-retry-count: 5
    lease-seconds: 60
    retry-initial-delay-seconds: 60
    retry-max-delay-seconds: 900
    worker-heartbeat-timeout-seconds: 120
  h5:
    loan:
      amount-range:
        min: 100
        max: 5000
        step: 100
        default-amount: 3000
      term-options:
        - label: 3期
          value: 3
      annual-rate: 0.18
      lender: XX商业银行
      receiving-account:
        bank-name: 招商银行
        last-four: "8648"
        account-id: acc_001
    benefits:
      product-code: HUXUAN_CARD
      activate:
        default-loan-amount: 300000
        supported-card-type: huixuan_card
        success-message: 惠选卡开通成功
      detail:
        card-name: 惠选卡
        price: 300
        total-saving: 448
        features:
          - title: 先享后付，无压力消费
            description: 支持多种消费场景，权益开通后可按规则使用。
          - title: 费用预估¥100/月，共3期
            description: 当前按 3 期固定展示，便于前端与后端先联通。
          - title: 匹配优质权益，不成功不收费
            description: 结合当前权益服务能力返回统一展示信息。
        categories:
          - name: 影音会员
            icon: tv
            benefits:
              - discount: 5折
                title: 每月4选1影视VIP会员
                description: 腾讯视频、优酷、爱奇艺、芒果TV任选
                validity: 有效期30天/次
                original-price: 30
                saving: 15
          - name: 出行服务
            icon: car
            benefits:
              - discount: 8折
                title: 出行礼包
                description: 覆盖打车和代驾等高频场景
                validity: 有效期30天/次
                original-price: 50
                saving: 10
        tips:
          - 权益服务费基于惠聚会员服务收取，请以页面展示说明为准。
          - 本费用为互联网增值服务费用，成功开通后不支持无理由撤销。
          - 您充分知晓服务内容后再进行开通操作。
        protocols:
          - name: 用户服务协议
            url: /protocols/user-service
          - name: 隐私条款声明
            url: /protocols/privacy
          - name: 委托扣款协议
            url: /protocols/debit
          - name: 权益服务协议
            url: /protocols/benefits
  business:
    default-provider-code: QW
  third-party:
    yunka:
      enabled: true
      mode: MOCK
      base-url: https://yunka.test
      gateway-path: /api/gateway/proxy
      connect-timeout-ms: 2000
      read-timeout-ms: 3000
      paths:
        loan-calculate: /loan/trail
        loan-query: /loan/query
        loan-apply: /loan/apply
        repay-trial: /repay/trial
        repay-apply: /repay/apply
        repay-query: /repay/query
        protocol-query: /protocol/queryProtocolAggregationLink
        user-token: /user/token
        user-query: /user/query
        loan-repay-plan: /loan/repayPlan
        card-sms-send: /card/smsSend
        card-sms-confirm: /card/smsConfirm
        card-user-cards: /card/userCards
        credit-image-query: /credit/image/query
        benefit-sync: /benefit/sync
    tech-platform:
      enabled: true
      mode: MOCK
      base-url: https://tech-platform.test
      channel-id: abs-test
      version: 1.0.0
      sign-secret: tech-platform-secret
      sign-algorithm: HMAC_SHA256
      aes-key-base64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      aes-algorithm: AES/ECB/PKCS5Padding
      gcm-tag-bits: 128
      iv-length-bytes: 12
      connect-timeout-ms: 2000
      read-timeout-ms: 3000
      paths:
        credit-status-notice: /guide/api/creditStatusNotice
        loan-info-notice: /guide/api/loanInfoNotice
        repay-info-notice: /guide/api/repayInfoNotice
    qw:
      enabled: true
      mode: MOCK
      base-url: https://t-api.test.qweimobile.com
      method-path: /api/abs/method
      partner-no: abs
      version: v1.0
      sign-key: test-sign-key
      connect-timeout-ms: 2000
      read-timeout-ms: 3000
      aes-key: 0123456789abcdef
      aes-key-base64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      aes-key-encoding: RAW
      aes-algorithm: AES/ECB/PKCS5Padding
      ciphertext-encoding: HEX
      gcm-tag-bits: 128
      iv-length-bytes: 12
      default-pay-protocol-prefix: proto-
      # 测试环境默认关闭；需要联调时按 profile 和开关显式打开。
      member-sync-pay-protocol-no-override:
      allow-member-sync-pay-protocol-no-override: false
      member-sync-pay-protocol-no-override-allowed-profiles: test,mysql-it,local
      mock-exercise-base-url: https://mock-qw.test/exercise
      direct:
        base-url: https://tlt-test.allinpay.com
        process-path: /aipg/ProcessServlet
        merchant-id: 200000000007804
        user-name: 20000000000780404
        user-password: 111111
        channel-code: allinpay-1
        account-no: 200000000007804
        pkcs12-path: docs/third-part/齐为/通联测试证书/user-rsa.p12
        pkcs12-password: 111111
        verify-cert-path: docs/third-part/齐为/通联测试证书/public-rsa.cer
        connect-timeout-ms: 3000
        read-timeout-ms: 5000
        member-sync-service-code: SYNC001
        exercise-url-service-code: TOKEN001
        lending-notify-service-code: LEND001
  crypto:
    dek:
      key-id: DEK_USER_PROFILE
      key-version: 1
      algorithm: AES/GCM/NoPadding
      purpose: encrypt_user_sensitive_fields
      status: ACTIVE
      plaintext-key-base64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    inbound:
      default-mode: PLAIN
      channel-modes:
        KJ: PLAIN
  signature:
    app-id: test-app
    secret: test-secret
    max-skew-seconds: 300
    protected-path-prefixes:
      - /api/callbacks
  auth:
    tech-platform-base-url: http://localhost:18080
    tech-platform-user-me-path: /api/users/me
    connect-timeout-ms: 2000
    read-timeout-ms: 3000
    retry-max-attempts: 2
    default-channel-code: KJ
    default-redirect-url: /equity/index
    redirect-whitelist:
      - /equity/
      - https://equity.nexusfin.com/
    protected-path-prefixes:
      - /api/equity/products
      - /api/equity/orders
      - /api/equity/exercise-url
      - /api/bank-card
      - /api/loan
      - /api/benefits
      - /api/repayment
      - /api/users/me
    excluded-path-prefixes:
      - /api/equity/health
      - /api/auth/sso-callback
      - /api/auth/joint-login
      - /api/callbacks
    jwt:
      issuer: nexusfin-equity-test
      secret: test-jwt-secret-key-test-jwt-secret-key
      ttl-seconds: 7200
      cookie-name: NEXUSFIN_AUTH
      cookie-path: /
      cookie-secure: false
      cookie-http-only: true
      cookie-same-site: Lax
