openapi: 3.0.3
info:
  title: NexusFin Equity Public API
  version: 1.1.0
  description: >
    Public ABS-side contracts after cross-domain auth migration. Browser entry
    uses SSO callback plus local JWT cookie. Business APIs derive member context
    from local auth state rather than client-supplied member IDs.
servers:
  - url: https://abs.example.com
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: NEXUSFIN_AUTH
    appSignature:
      type: apiKey
      in: header
      name: X-Signature
  parameters:
    XAppId:
      name: X-App-Id
      in: header
      required: true
      schema:
        type: string
    XTimestamp:
      name: X-Timestamp
      in: header
      required: true
      schema:
        type: string
    XNonce:
      name: X-Nonce
      in: header
      required: true
      schema:
        type: string
    XSignature:
      name: X-Signature
      in: header
      required: true
      schema:
        type: string
  schemas:
    Result:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          nullable: true
      required:
        - code
        - message
    CurrentUserResponse:
      type: object
      properties:
        memberId:
          type: string
        techPlatformUserId:
          type: string
        externalUserId:
          type: string
        memberStatus:
          type: string
    ProductPageResponse:
      type: object
      properties:
        productCode:
          type: string
        productName:
          type: string
        feeRate:
          type: integer
        agreements:
          type: array
          items:
            type: string
        memberId:
          type: string
        externalUserId:
          type: string
    CreateOrderRequest:
      type: object
      required:
        - requestId
        - productCode
        - loanAmount
        - agreementSigned
      properties:
        requestId:
          type: string
        productCode:
          type: string
        loanAmount:
          type: integer
          format: int64
        agreementSigned:
          type: boolean
    CreateOrderResponse:
      type: object
      properties:
        benefitOrderNo:
          type: string
        orderStatus:
          type: string
        redirectUrl:
          type: string
    OrderStatusResponse:
      type: object
      properties:
        benefitOrderNo:
          type: string
        orderStatus:
          type: string
        firstDeductStatus:
          type: string
        fallbackDeductStatus:
          type: string
        exerciseStatus:
          type: string
        grantStatus:
          type: string
    ExerciseUrlResponse:
      type: object
      properties:
        exerciseUrl:
          type: string
        expireTime:
          type: string
paths:
  /api/auth/sso-callback:
    get:
      summary: Verify upstream token, provision member, set local JWT cookie, and redirect
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: redirect_url
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Browser redirected with local auth cookie issued
  /api/users/me:
    get:
      summary: Resolve current logged-in ABS-side member
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current user resolved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CurrentUserResponse'
  /api/equity/products/{productCode}:
    get:
      summary: Get equity product purchase page data for current user
      security:
        - cookieAuth: []
      parameters:
        - name: productCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product data loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProductPageResponse'
  /api/equity/orders:
    post:
      summary: Create a benefit order from the ABS H5 flow for current user
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '200':
          description: Order created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CreateOrderResponse'
  /api/equity/orders/{benefitOrderNo}:
    get:
      summary: Query the current benefit order status
      security:
        - cookieAuth: []
      parameters:
        - name: benefitOrderNo
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current order status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrderStatusResponse'
  /api/equity/exercise-url/{benefitOrderNo}:
    get:
      summary: Get exercise URL for an existing order
      security:
        - cookieAuth: []
      parameters:
        - name: benefitOrderNo
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Exercise URL loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ExerciseUrlResponse'
